services:
  wattos-mysql:
    image: mysql:8
    container_name: wattos-mysql
    restart: always
    user: "${MYSQL_USER:-17473:10144}"
    environment:
      MYSQL_ROOT_PASSWORD: PASSWORD
    volumes:
      - mysql-data:/var/lib/mysql
      - ${INITDB_DIR:-/projects/BMRB/public/wattos/wattos/initdb}:/docker-entrypoint-initdb.d/
      - ${DBFS_DIR:-/projects/BMRB/public/wattos/dbfs}:/wattos/dbfs
      - ${HTML_DIR:-/projects/BMRB/public/wattos/html}:/wattos/html
    # MySQL 8.0 dropped the query cache. Its role on this read-only
    # workload (warming the landing-page GROUP-BYs) is now played by
    # the in-process Caffeine cache in MRGridServlet.
    command: >
      --secure-file-priv=/wattos/dbfs
    healthcheck:
      # Used by tomcat's depends_on below so the JDBC pool doesn't try
      # to connect before mysqld is accepting clients (the race
      # produced a SEVERE pool-init stack on every restart). mysqladmin
      # ping is shipped in the mysql image and exits 0 once the
      # server is up.
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pPASSWORD", "--silent"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    networks:
      - wattos-network

  wattos-tomcat:
    image: tomcat:11-jdk21-temurin
    container_name: wattos-tomcat
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      # -Xmx768m leaves ~256 MB headroom for the in-process response
      # cache (CACHE_MAX_BYTES in MRGridServlet) plus the JVM baseline.
      JAVA_OPTS: "-Duser.home=/ -Xmx768m"
    volumes:
      - ${RUNTIME_PROPS:-/projects/BMRB/public/wattos/wattos/wattos.runtime.properties.uchc}:/wattos.runtime.properties
      - ./tomcat/server.xml:/usr/local/tomcat/conf/server.xml:ro
      # Empty tmpfs over webapps/ shadows the image's default ROOT/manager/
      # host-manager/examples/docs webapps; the NRG bind-mount below nests
      # inside this tmpfs as a sub-mount, so only NRG is deployed.
      - type: tmpfs
        target: /usr/local/tomcat/webapps
      - ${NRG_DIR:-/projects/BMRB/public/wattos/wattos/wattos/NRG}:/usr/local/tomcat/webapps/NRG
      - ${DBFS_DIR:-/projects/BMRB/public/wattos/dbfs}:/wattos/dbfs
      - ${PDB_DIR:-/projects/BMRB/public/ftp/pub/pdb}:/pdb
    depends_on:
      wattos-mysql:
        condition: service_healthy
    networks:
      - wattos-network

networks:
  wattos-network:
    driver: bridge

volumes:
  mysql-data:
