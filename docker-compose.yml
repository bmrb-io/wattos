services:
  wattos-mysql:
    image: mysql:5
    container_name: wattos-mysql
    restart: always
    user: "${MYSQL_USER:-17473:10144}"
    environment:
      MYSQL_ROOT_PASSWORD: PASSWORD
    volumes:
      - mysql-data:/var/lib/mysql
      - ${INITDB_DIR:-/projects/BMRB/public/wattos/wattos/initdb}:/docker-entrypoint-initdb.d/
      - ${DBFS_DIR:-/projects/BMRB/public/wattos/dbfs}:/wattos/dbfs
      - ${HTML_DIR:-/projects/BMRB/public/wattos/html}:/wattos/html
    # query cache helps a lot for this workload: the dataset is essentially
    # read-only between wattos_load.sql runs, and the landing/grid pages fire
    # several heavy GROUP-BY/aggregate queries that benefit from caching.
    # query cache was removed in MySQL 8.0; revisit when migrating off 5.7.
    command: >
      --secure-file-priv=/wattos/dbfs
      --query_cache_type=1
      --query_cache_size=67108864
      --query_cache_limit=4194304
    networks:
      - wattos-network

  wattos-tomcat:
    image: tomcat:9.0-jre11-temurin
    container_name: wattos-tomcat
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      JAVA_OPTS: "-Duser.home=/"
    volumes:
      - ${RUNTIME_PROPS:-/projects/BMRB/public/wattos/wattos/wattos.runtime.properties.uchc}:/wattos.runtime.properties
      - ./tomcat/server.xml:/usr/local/tomcat/conf/server.xml:ro
      # Empty tmpfs over webapps/ shadows the image's default ROOT/manager/
      # host-manager/examples/docs webapps; the NRG bind-mount below nests
      # inside this tmpfs as a sub-mount, so only NRG is deployed.
      - type: tmpfs
        target: /usr/local/tomcat/webapps
      - ${NRG_DIR:-/projects/BMRB/public/wattos/wattos/wattos/NRG}:/usr/local/tomcat/webapps/NRG
      - ${DBFS_DIR:-/projects/BMRB/public/wattos/dbfs}:/wattos/dbfs
      - ${PDB_DIR:-/projects/BMRB/public/ftp/pub/pdb}:/pdb
    depends_on:
      - wattos-mysql
    networks:
      - wattos-network

networks:
  wattos-network:
    driver: bridge

volumes:
  mysql-data:
